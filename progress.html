<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Progress Tracking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: azure;
      font-family: 'Poppins', sans-serif;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .result-box {
      margin-top: 1rem;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card p-4" style="width: 400px;">
    <h4 class="text-center mb-3">Student Progress Tracking</h4>
    <p class="text-muted text-center">Track academic performance and metrics easily.</p>
    <div class="mb-3">
      <input type="number" id="n1" class="form-control mb-2" placeholder="Enter Task 1 score">
      <input type="number" id="n2" class="form-control mb-2" placeholder="Enter Task 2 score">
      <div class="d-flex justify-content-between">
        <button onclick="calculate('+')" class="btn btn-success">Add</button>
        <button onclick="calculate('-')" class="btn btn-danger">Subtract</button>
      </div>
      <div id="result" class="result-box"></div>
    </div>
  </div>

  <script>
    function calculate(op) {
      let n1 = parseFloat(document.getElementById("n1").value);
      let n2 = parseFloat(document.getElementById("n2").value);
      let res;
      if (isNaN(n1) || isNaN(n2)) {
        res = "Invalid input";
      } else {
        switch (op) {
          case '+': res = n1 + n2; break;
          case '-': res = n1 - n2; break;
        }
      }
      document.getElementById("result").innerText = "Result: " + res;
    }
  </script>

</body>
</html>
